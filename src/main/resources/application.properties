# ============================================================
# APPLICATION
# ============================================================
spring.application.name=microbiz-pro
server.port=8080
# ============================================================
# DATASOURCE — Connexion MySQL
# ============================================================
spring.datasource.url=${MICROBIZ_DB_URL:jdbc:mysql://localhost:3306/microbiz_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MICROBIZ_DB_USER:root}
spring.datasource.password=${MICROBIZ_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=${MICROBIZ_JPA_DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ============================================================
# THYMELEAF
# ============================================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
# ============================================================
# UPLOAD DE FICHIERS (optionnel)
# ============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# ============================================================
# LOGS (afficher les requêtes SQL dans la console)
# ============================================================
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO
logging.level.com.microbiz=INFO

# ============================================================
# INITIALISATION DES DONNÉES (DEV UNIQUEMENT)
# ============================================================
microbiz.seed.demo-data=${MICROBIZ_SEED_DEMO_DATA:false}
microbiz.seed.admin-password=${MICROBIZ_ADMIN_PASSWORD:}
microbiz.seed.user-password=${MICROBIZ_USER_PASSWORD:}
microbiz.webhook.url=${MICROBIZ_WEBHOOK_URL:}
microbiz.stock-alert.cron=${MICROBIZ_STOCK_ALERT_CRON:0 0 8 * * *}
microbiz.notifications.to=${MICROBIZ_NOTIFICATIONS_TO:}
microbiz.notifications.impayees-cron=${MICROBIZ_IMPAYEES_CRON:0 30 8 * * *}

# ============================================================
# EMAIL / SMTP (SendGrid, Mailgun ou SMTP local)
# ============================================================
spring.mail.host=${MICROBIZ_SMTP_HOST:localhost}
spring.mail.port=${MICROBIZ_SMTP_PORT:1025}
spring.mail.username=${MICROBIZ_SMTP_USERNAME:}
spring.mail.password=${MICROBIZ_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MICROBIZ_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MICROBIZ_SMTP_STARTTLS:false}

# ============================================================
# MULTI-DEVISE
# ============================================================
microbiz.currency.base=${MICROBIZ_BASE_CURRENCY:XAF}
microbiz.currency.usd-to-base=${MICROBIZ_USD_TO_BASE:600}
microbiz.currency.eur-to-base=${MICROBIZ_EUR_TO_BASE:655.957}
microbiz.currency.gnf-to-base=${MICROBIZ_GNF_TO_BASE:0.07}
microbiz.currency.api-url=${MICROBIZ_CURRENCY_API_URL:}
microbiz.currency.refresh-cron=${MICROBIZ_CURRENCY_REFRESH_CRON:0 0 */6 * * *}

microbiz.stock-alert.threshold=${MICROBIZ_STOCK_ALERT_THRESHOLD:10}
