<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/dashboard-layout :: layout(~{::content}, 'Comptabilité OHADA', 'Journal simplifié', 'ohada')">
<div th:fragment="content">
    <div class="container-fluid p-4">
        <h2 class="mb-3">Journal comptable OHADA simplifié</h2>
        <form class="row g-2 mb-3" method="get" th:action="@{/comptabilite/ohada}">
            <div class="col-md-3"><input type="date" class="form-control" name="debut" th:value="${debut}"></div>
            <div class="col-md-3"><input type="date" class="form-control" name="fin" th:value="${fin}"></div>
            <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Filtrer</button></div>
        </form>
        <div class="card p-3 shadow-sm">
            <table class="table table-sm table-striped mb-0">
                <thead><tr><th>Date</th><th>Journal</th><th>Compte</th><th>Libellé</th><th>Débit</th><th>Crédit</th></tr></thead>
                <tbody>
                <tr th:each="e : ${entries}">
                    <td th:text="${e['date']}"></td>
                    <td th:text="${e['journal']}"></td>
                    <td th:text="${e['compte']}"></td>
                    <td th:text="${e['libelle']}"></td>
                    <td th:text="${#numbers.formatDecimal(e['debit'],0,'COMMA',0,'POINT')}"></td>
                    <td th:text="${#numbers.formatDecimal(e['credit'],0,'COMMA',0,'POINT')}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(entries)}"><td colspan="6">Aucune écriture sur la période.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</html>
