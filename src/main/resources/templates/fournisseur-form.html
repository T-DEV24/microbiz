<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroBiz Pro — Fournisseur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0f1117;--surface:#161b27;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--text:#e2e8f0;--muted:rgba(255,255,255,.4);--blue:#3b82f6;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
        .form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 40px;width:100%;max-width:480px;}
        .form-title{font-size:18px;font-weight:600;color:#fff;margin-bottom:6px;}
        .form-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
        .form-label-dark{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px;}
        .form-control-dark{background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:10px 14px;font-family:'DM Sans',sans-serif;width:100%;margin-bottom:16px;}
        .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;}
        .btn-submit{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;}
        .btn-cancel{background:none;color:var(--muted);border:1px solid var(--border2);border-radius:9px;padding:10px 18px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block;}
        .error-text{color:#fca5a5;font-size:12px;margin-top:-12px;margin-bottom:10px;}
        @media (max-width: 576px){
            body{padding:18px 12px;align-items:flex-start;}
            .form-card{padding:22px 16px;border-radius:12px;}
            .form-actions{flex-direction:column-reverse;align-items:stretch;}
            .btn-submit,.btn-cancel{width:100%;text-align:center;}
        }

    </style>
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="form-card">
    <div class="form-title" th:text="${fournisseur.id != null} ? 'Modifier le fournisseur' : 'Nouveau fournisseur'">Fournisseur</div>
    <div class="form-sub">Informations de contact du fournisseur</div>

    <form th:action="@{/fournisseurs/sauvegarder}" method="post" th:object="${fournisseur}">
        <input type="hidden" th:field="*{id}">

        <label class="form-label-dark">Nom *</label>
        <input type="text" class="form-control-dark" th:field="*{nom}" placeholder="Ex : Distrib Pro" required>
        <div class="error-text" th:if="${#fields.hasErrors('nom')}" th:errors="*{nom}"></div>

        <label class="form-label-dark">Téléphone</label>
        <input type="text" class="form-control-dark" th:field="*{telephone}" placeholder="+237 670 000 000">

        <label class="form-label-dark">Email</label>
        <input type="email" class="form-control-dark" th:field="*{email}" placeholder="contact@fournisseur.com">

        <div class="form-actions">
            <a href="/fournisseurs" class="btn-cancel">Annuler</a>
            <button type="submit" class="btn-submit" th:text="${fournisseur.id != null} ? 'Enregistrer' : 'Ajouter'">Ajouter</button>
        </div>
    </form>
</div>
</body>
</html>
