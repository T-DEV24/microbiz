<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/dashboard-layout :: layout(~{::content}, 'Audit logs', 'Traçabilité des actions', 'audit-logs')">
<div th:fragment="content">
    <style>
        .topbar { background:#fff; border-bottom:1px solid #e5e7eb; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
        .page-title { font-size:28px; font-weight:700; color:#111827; line-height:1.2; }
        .page-sub { color:#6b7280; font-size:13px; margin-top:4px; }
        .content { padding:24px; }
        .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; overflow:hidden; margin-bottom:16px; }
        .card-header { padding:14px 16px; border-bottom:1px solid #f3f4f6; display:flex; justify-content:space-between; align-items:center; }
        .card-title { font-size:14px; font-weight:700; color:#1f2937; }
        .card-body { padding:16px; }
        .action-btn { border:1px solid #d1d5db; background:#fff; color:#374151; border-radius:8px; padding:6px 10px; font-size:12px; text-decoration:none; }
        .btn-edit { border-color:#c7d2fe; color:#4338ca; background:#eef2ff; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:10px 12px; border-bottom:1px solid #f1f5f9; font-size:14px; }
        th { color:#6b7280; font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
    </style>
    <div class="topbar">
        <div>
            <div class="page-title">Journal d’audit</div>
            <div class="page-sub">Historique des actions sensibles</div>
        </div>
    </div>
    <div class="content">
        <div class="card">
            <div class="card-header">
                <div class="card-title" th:text="${logsPage.totalElements} + ' événements'">0 événements</div>
            </div>
            <div class="card-body">
                <table>
                    <thead>
                    <tr>
                        <th>Date</th>
                        <th>Utilisateur</th>
                        <th>Action</th>
                        <th>Entité</th>
                        <th>ID</th>
                        <th>Détails</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="l : ${logs}">
                        <td th:text="${#temporals.format(l.createdAt, 'dd/MM/yyyy HH:mm')}">--</td>
                        <td th:text="${l.username}">--</td>
                        <td th:text="${l.action}">--</td>
                        <td th:text="${l.entityType}">--</td>
                        <td th:text="${l.entityId != null ? l.entityId : '—'}">—</td>
                        <td th:text="${l.details != null ? l.details : '—'}">—</td>
                    </tr>
                    </tbody>
                </table>
                <div style="display:flex;justify-content:space-between;margin-top:12px" th:if="${logsPage.totalPages > 1}">
                    <a class="action-btn btn-edit" th:if="${logsPage.hasPrevious()}"
                       th:href="@{/audit-logs(page=${logsPage.number-1},size=${logsPage.size})}">Précédent</a>
                    <a class="action-btn btn-edit" th:if="${logsPage.hasNext()}"
                       th:href="@{/audit-logs(page=${logsPage.number+1},size=${logsPage.size})}">Suivant</a>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
