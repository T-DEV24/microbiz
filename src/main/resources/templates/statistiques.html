<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/dashboard-layout :: layout(~{::content}, 'Statistiques', 'BI & Rapports', 'statistiques')">
<div th:fragment="content">
    <style>
        .kpi-box { background:#fff; border-radius:12px; border:1px solid #e5e7eb; padding:20px; text-align:center; }
        .kpi-num { font-size:32px; font-weight:600; font-family:'DM Mono',monospace; }
        .kpi-lbl { font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:.05em; margin-top:4px; }
        .metric-card { background:#fff; border-radius:12px; border:1px solid #e5e7eb; padding:20px; }
        .chart-card { background:#fff; border-radius:12px; border:1px solid #e5e7eb; overflow-x:auto; }
        .chart-card .card-header { background:transparent; border-bottom:1px solid #f3f4f6; padding:14px 18px; font-weight:600; font-size:13px; color:#111827; }
        .delta { font-size:11px; font-weight:600; }
        .delta.up { color:#059669; }
        .delta.down { color:#dc2626; }
        .top-item { display:flex; align-items:center; gap:12px; padding:10px 18px; border-bottom:1px solid #f3f4f6; }
        .top-item:last-child { border-bottom:none; }
        .top-rank { width:26px; height:26px; border-radius:50%; background:#f3f4f6; color:#6b7280; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; }
        .top-rank.gold{background:#fef3c7;color:#92400e;} .top-rank.silver{background:#f1f5f9;color:#475569;} .top-rank.bronze{background:#fff7ed;color:#9a3412;}
        .progress-bar-thin { height:4px; border-radius:99px; background:#f3f4f6; margin-top:4px; }
        .progress-fill { height:100%; border-radius:99px; background:#3b82f6; }
    </style>

    <div class="topbar d-flex justify-content-between align-items-center">
        <div>
            <h1 class="h5 mb-0 fw-semibold">Statistiques</h1>
            <div class="text-muted" style="font-size:12px">Indicateurs filtrables + comparaison N/N-1</div>
        </div>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/statistiques/export.csv(periode=${periode},top=${top},debut=${debut},fin=${fin})}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-filetype-csv me-1"></i>CSV</a>
            <a th:href="@{/statistiques/export-pdf(periode=${periode},top=${top},debut=${debut},fin=${fin})}" class="btn btn-danger btn-sm"><i class="bi bi-file-earmark-pdf me-1"></i>PDF</a>
        </div>
    </div>

    <div class="p-4">
        <form th:action="@{/statistiques}" method="get" class="row g-2 mb-3 align-items-end">
            <div class="col-md-2"><label class="form-label small text-muted">Début</label><input type="date" name="debut" class="form-control form-control-sm" th:value="${debut}"></div>
            <div class="col-md-2"><label class="form-label small text-muted">Fin</label><input type="date" name="fin" class="form-control form-control-sm" th:value="${fin}"></div>
            <div class="col-md-2"><label class="form-label small text-muted">Période</label>
                <select name="periode" class="form-select form-select-sm">
                    <option value="mois" th:selected="${periode == 'mois'}">Mensuel</option>
                    <option value="semaine" th:selected="${periode == 'semaine'}">Hebdo</option>
                    <option value="semestre" th:selected="${periode == 'semestre'}">Semestriel</option>
                </select>
            </div>
            <div class="col-md-2"><label class="form-label small text-muted">Top</label>
                <select name="top" class="form-select form-select-sm">
                    <option value="5" th:selected="${top == 5}">Top 5</option><option value="8" th:selected="${top == 8}">Top 8</option><option value="10" th:selected="${top == 10}">Top 10</option>
                </select>
            </div>
            <div class="col-md-4 d-flex gap-2"><button class="btn btn-primary btn-sm" type="submit"><i class="bi bi-funnel"></i> Appliquer</button><a href="/statistiques" class="btn btn-outline-secondary btn-sm">Réinitialiser</a></div>
        </form>
        <div th:if="${erreur}" class="alert alert-danger py-2" th:text="${erreur}"></div>

        <div class="row g-3 mb-4">
            <div class="col-md-4"><div class="kpi-box"><div class="kpi-num text-primary" th:text="${nbVentes}">0</div><div class="kpi-lbl">Ventes enregistrées</div></div></div>
            <div class="col-md-4"><div class="kpi-box"><div class="kpi-num text-success" th:text="${nbProduits}">0</div><div class="kpi-lbl">Produits actifs</div></div></div>
            <div class="col-md-4"><div class="kpi-box"><div class="kpi-num" style="color:#8b5cf6" th:text="${nbClients}">0</div><div class="kpi-lbl">Clients enregistrés</div></div></div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-md-3"><div class="metric-card"><div style="font-size:11px;color:#6b7280;text-transform:uppercase">CA</div><div style="font-size:20px;font-weight:600;color:#2563eb;font-family:'DM Mono',monospace" th:text="${#numbers.formatDecimal(caTotal,0,'COMMA',0,'POINT')} + ' ' + ${devisePrincipale}">0</div><div class="delta" th:if="${variationCa!=null}" th:classappend="${variationCa>=0 ? ' up' : ' down'}" th:text="${#numbers.formatDecimal(variationCa,0,'COMMA',1,'POINT')} + '% vs N-1'"></div></div></div>
            <div class="col-md-3"><div class="metric-card"><div style="font-size:11px;color:#6b7280;text-transform:uppercase">Dépenses</div><div style="font-size:20px;font-weight:600;color:#dc2626;font-family:'DM Mono',monospace" th:text="${#numbers.formatDecimal(depenses,0,'COMMA',0,'POINT')} + ' ' + ${devisePrincipale}">0</div><div class="delta" th:if="${variationDepenses!=null}" th:classappend="${variationDepenses<=0 ? ' up' : ' down'}" th:text="${#numbers.formatDecimal(variationDepenses,0,'COMMA',1,'POINT')} + '% vs N-1'"></div></div></div>
            <div class="col-md-3"><div class="metric-card"><div style="font-size:11px;color:#6b7280;text-transform:uppercase">Bénéfice</div><div style="font-size:20px;font-weight:600;font-family:'DM Mono',monospace" th:style="${benefice>=0}?'color:#059669':'color:#dc2626'" th:text="${#numbers.formatDecimal(benefice,0,'COMMA',0,'POINT')} + ' ' + ${devisePrincipale}">0</div><div class="delta" th:if="${variationBenefice!=null}" th:classappend="${variationBenefice>=0 ? ' up' : ' down'}" th:text="${#numbers.formatDecimal(variationBenefice,0,'COMMA',1,'POINT')} + '% vs N-1'"></div></div></div>
            <div class="col-md-3"><div class="metric-card"><div style="font-size:11px;color:#6b7280;text-transform:uppercase">Marge</div><div style="font-size:20px;font-weight:600;font-family:'DM Mono',monospace" th:style="${marge>=40}?'color:#059669':(${marge>=20}?'color:#d97706':'color:#dc2626')" th:text="${#numbers.formatDecimal(marge,0,'COMMA',1,'POINT')} + ' %'">0</div><div class="delta" th:if="${variationMarge!=null}" th:classappend="${variationMarge>=0 ? ' up' : ' down'}" th:text="${#numbers.formatDecimal(variationMarge,0,'COMMA',1,'POINT')} + '% vs N-1'"></div></div></div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-lg-7"><div class="chart-card"><div class="card-header"><i class="bi bi-bar-chart me-2 text-primary"></i>Évolution du CA</div><div class="p-3"><div style="position:relative;height:240px"><canvas id="chartCA"></canvas></div></div></div></div>
            <div class="col-lg-5"><div class="chart-card"><div class="card-header"><i class="bi bi-pie-chart me-2 text-warning"></i>Dépenses par catégorie</div><div class="p-3"><div style="position:relative;height:240px"><canvas id="chartDep"></canvas></div></div></div></div>
        </div>

        <div class="row g-3 mb-4">
            <div class="col-lg-6"><div class="chart-card"><div class="card-header"><i class="bi bi-bar-chart-line me-2 text-success"></i>CA vs Dépenses vs Bénéfice</div><div class="p-3"><div style="position:relative;height:220px"><canvas id="chartBen"></canvas></div></div></div></div>
            <div class="col-lg-6"><div class="chart-card"><div class="card-header"><i class="bi bi-trophy me-2 text-warning"></i>Top produits (Top <span th:text="${top}">5</span>)</div><div th:each="item, stat : ${topProduits}" class="top-item"><div class="top-rank" th:classappend="${stat.index==0}?' gold':(${stat.index==1}?' silver':(${stat.index==2}?' bronze':''))" th:text="${stat.index+1}">1</div><div class="flex-grow-1"><div style="font-size:13px;font-weight:500;color:#111827" th:text="${item['produit'].nom}">--</div><div style="font-size:11px;color:#9ca3af" th:text="${item['quantite']} + ' unités'"></div><div class="progress-bar-thin"><div class="progress-fill" th:style="'width:' + ${100 - stat.index * 18} + '%'"></div></div></div><div style="font-size:12px;font-weight:600;color:#059669;font-family:'DM Mono',monospace" th:text="${#numbers.formatDecimal(item['ca'],0,'COMMA',0,'POINT')} + ' ' + ${devisePrincipale}">0</div></div><div th:if="${#lists.isEmpty(topProduits)}" class="text-center text-muted py-4" style="font-size:13px">Aucune vente.</div></div></div>
        </div>
    </div>

    <script th:inline="javascript">
        const evolutionCA = /*[[${evolutionCA}]]*/ {};
        const depensesCateg = /*[[${depensesCategories}]]*/ {};
        const beneficeVal = /*[[${benefice}]]*/ 0;
        const depensesVal = /*[[${depenses}]]*/ 0;
        const caTotalVal = /*[[${caTotal}]]*/ 0;
        const devisePrincipale = /*[[${devisePrincipale}]]*/ 'XAF';
    </script>
    <script>
        const gridColor = 'rgba(0,0,0,.05)';
        const tickColor = '#9ca3af';
        new Chart(document.getElementById('chartCA'), {type: 'line', data: {labels: Object.keys(evolutionCA), datasets: [{label: 'CA (' + devisePrincipale + ')', data: Object.values(evolutionCA), borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,.08)', fill: true, tension: .4, pointRadius: 5, pointBackgroundColor: '#3b82f6', borderWidth: 2}]}, options: {responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: {x: { grid: { display: false }, ticks: { color: tickColor, font: { size: 11 } } }, y: { grid: { color: gridColor }, ticks: { color: tickColor, font: { size: 11 } } }}}});
        new Chart(document.getElementById('chartDep'), {type: 'doughnut', data: {labels: Object.keys(depensesCateg), datasets: [{data: Object.values(depensesCateg), backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899'], borderWidth: 0}]}, options: {responsive: true, maintainAspectRatio: false, cutout: '65%', plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 10, boxWidth: 10 } } }}});
        new Chart(document.getElementById('chartBen'), {type: 'bar', data: {labels: ['Synthèse financière'], datasets: [{ label: 'CA', data: [caTotalVal], backgroundColor: 'rgba(59,130,246,.7)', borderRadius: 6 },{ label: 'Dépenses', data: [depensesVal], backgroundColor: 'rgba(220,38,38,.7)', borderRadius: 6 },{ label: 'Bénéfice', data: [beneficeVal], backgroundColor: 'rgba(16,185,129,.7)', borderRadius: 6 }]}, options: {responsive: true, maintainAspectRatio: false}});
    </script>
</div>
</html>
