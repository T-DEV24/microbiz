<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/dashboard-layout :: layout(~{::content}, 'Entreprise', 'Paramètres légaux et branding', 'entreprise')">
<div th:fragment="content">
    <div class="container-fluid p-4" style="max-width:920px">
        <h2 class="mb-3">Personnalisation des factures</h2>
        <div class="alert alert-success" th:if="${succes}" th:text="${succes}"></div>
        <form th:action="@{/entreprise}" method="post" enctype="multipart/form-data" th:object="${settings}" class="card p-4 shadow-sm">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nom entreprise</label>
                    <input class="form-control" th:field="*{nomEntreprise}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">SIRET</label>
                    <input class="form-control" th:field="*{siret}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">RCCM</label>
                    <input class="form-control" th:field="*{rccm}">
                </div>
                <div class="col-12">
                    <label class="form-label">Adresse</label>
                    <input class="form-control" th:field="*{adresse}">
                </div>
                <div class="col-12">
                    <label class="form-label">Mentions légales</label>
                    <textarea rows="3" class="form-control" th:field="*{mentionsLegales}"></textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Logo (PNG/JPG)</label>
                    <input type="file" class="form-control" name="logoFile" accept="image/*">
                </div>
                <div class="col-md-6" th:if="${settings.logo != null}">
                    <label class="form-label d-block">Logo actuel</label>
                    <img th:src="@{/entreprise/logo}" alt="Logo" style="max-height:64px;max-width:100%;object-fit:contain;border:1px solid #e5e7eb;padding:8px;border-radius:8px">
                </div>
            </div>
            <div class="mt-3">
                <button class="btn btn-primary" type="submit">Enregistrer</button>
            </div>
        </form>
    </div>
</div>
</html>
