<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:replace="fragments/dashboard-layout :: layout(~{::content}, 'Utilisateurs', 'Administration', 'utilisateurs')">
  <div th:fragment="content">
    <style>
        .topbar { background:#fff; border-bottom:1px solid #e5e7eb; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
        .page-title { font-size:28px; font-weight:700; color:#111827; line-height:1.2; }
        .page-sub { color:#6b7280; font-size:13px; margin-top:4px; }
        .content { padding:24px; }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; overflow:hidden; margin-bottom:16px; }
        .card-header { padding:14px 16px; border-bottom:1px solid #f3f4f6; display:flex; justify-content:space-between; align-items:center; }
        .card-title { font-size:14px; font-weight:700; color:#1f2937; }
        .card-body { padding:16px; }
        .form-label-dark { font-size:12px; font-weight:600; color:#6b7280; margin-bottom:6px; display:block; }
        .form-control-dark { width:100%; background:#fff; border:1px solid #d1d5db; border-radius:8px; padding:10px 12px; margin-bottom:10px; font-size:14px; }
        .btn-submit, .btn-primary-custom { display:inline-block; border:none; border-radius:8px; padding:10px 14px; font-size:13px; font-weight:600; background:#3b82f6; color:#fff; text-decoration:none; }
        .action-btn { border:1px solid #d1d5db; background:#fff; color:#374151; border-radius:8px; padding:6px 10px; font-size:12px; text-decoration:none; }
        .btn-edit { border-color:#c7d2fe; color:#4338ca; background:#eef2ff; }
        .admin-banner { border:1px solid #fde68a; background:#fffbeb; color:#92400e; border-radius:10px; padding:10px 12px; font-size:13px; margin-bottom:16px; }
        .alert-success { border:1px solid #bbf7d0; background:#f0fdf4; color:#166534; border-radius:10px; padding:10px 12px; margin-bottom:12px; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:10px 12px; border-bottom:1px solid #f1f5f9; font-size:14px; }
        th { color:#6b7280; font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
        .user-avatar { width:30px; height:30px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; background:#dbeafe; color:#1e3a8a; font-weight:700; }
        .user-avatar.admin { background:#fee2e2; color:#991b1b; }
        .badge { padding:3px 8px; border-radius:999px; font-size:11px; font-weight:600; }
        .badge-amber { background:#fef3c7; color:#92400e; }
        @media (max-width: 1100px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
    <div class="topbar">
        <div>
            <div class="page-title">Gestion des utilisateurs</div>
            <div class="page-sub">Accès réservé aux administrateurs</div>
        </div>
        <a th:href="@{/utilisateurs/export.csv(q=${q},role=${role})}" class="action-btn btn-edit">Exporter CSV</a>
    </div>
    <div class="content">

        <div class="admin-banner">
            ⚠ Zone administrateur — Seuls les comptes ROLE_ADMIN peuvent accéder à cette page.
        </div>

        <div class="alert-success" th:if="${succes}" th:text="${succes}"></div>
        <div class="alert-success" th:if="${erreur}" style="background:#fef2f2;border-color:#fecaca;color:#b91c1c" th:text="${erreur}"></div>

        <form th:action="@{/utilisateurs}" method="get" style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
            <input type="text" name="q" class="form-control-dark" placeholder="Rechercher nom/email..." th:value="${q}" style="max-width:260px;margin-bottom:0">
            <select name="role" class="form-control-dark" style="max-width:220px;margin-bottom:0">
                <option value="">Tous les rôles</option>
                <option value="ROLE_ADMIN" th:selected="${role == 'ROLE_ADMIN'}">Administrateur</option>
                <option value="ROLE_USER" th:selected="${role == 'ROLE_USER'}">Utilisateur</option>
            </select>
            <button type="submit" class="action-btn btn-edit">Filtrer</button>
            <a href="/utilisateurs" class="action-btn">Reset</a>
        </form>

        <div class="grid-2">
            <!-- Formulaire ajout utilisateur -->
            <div class="card" style="margin-bottom:0">
                <div class="card-header"><div class="card-title">Ajouter un utilisateur</div></div>
                <div class="card-body">
                    <form th:action="@{/utilisateurs/sauvegarder}" method="post">
                        <label class="form-label-dark">Nom complet *</label>
                        <input type="text" class="form-control-dark" name="nom" placeholder="Ex : Jean Dupont" required>
                        <label class="form-label-dark">Email *</label>
                        <input type="email" class="form-control-dark" name="email" placeholder="jean@email.com" required>
                        <label class="form-label-dark">Mot de passe *</label>
                        <input type="password" class="form-control-dark" name="motDePasse" placeholder="Minimum 6 caractères" required>
                        <label class="form-label-dark">Rôle *</label>
                        <select class="form-control-dark" name="role" required>
                            <option value="ROLE_USER">Utilisateur simple</option>
                            <option value="ROLE_ADMIN">Administrateur</option>
                        </select>
                        <button type="submit" class="btn-submit">Créer l'utilisateur</button>
                    </form>
                </div>
            </div>

            <!-- Liste utilisateurs -->
            <div class="card" style="margin-bottom:0">
                <div class="card-header">
                    <div class="card-title">Utilisateurs actifs</div>
                    <span style="font-size:12px;color:var(--muted)" th:if="${utilisateurs != null}"
                          th:text="${#lists.size(utilisateurs)} + ' comptes'"></span>
                </div>
                <div th:if="${utilisateurs == null or #lists.isEmpty(utilisateurs)}" style="padding:30px;text-align:center;color:var(--muted);font-size:13px">
                    Aucun utilisateur.
                </div>
                <table th:if="${utilisateurs != null and not #lists.isEmpty(utilisateurs)}">
                    <thead><tr><th>Utilisateur</th><th>Email</th><th>Rôle</th></tr></thead>
                    <tbody>
                    <tr th:each="u : ${utilisateurs}">
                        <td>
                            <div style="display:flex;align-items:center;gap:10px">
                                <div class="user-avatar" th:classappend="${u.role == 'ROLE_ADMIN'} ? 'admin'"
                                     th:text="${#strings.substring(u.nom,0,1).toUpperCase()}">A</div>
                                <div>
                                    <div style="font-weight:500" th:text="${u.nom}">--</div>
                                    <div style="font-size:11px;color:var(--muted)" th:text="${u.isAdmin()} ? 'Administrateur' : 'Utilisateur'">--</div>
                                </div>
                            </div>
                        </td>
                        <td style="color:var(--muted);font-size:12px" th:text="${u.email}">--</td>
                        <td>
                            <span class="badge badge-amber" th:if="${u.role == 'ROLE_ADMIN'}">Admin</span>
                            <span class="badge" style="background:rgba(255,255,255,.06);color:var(--muted)" th:if="${u.role != 'ROLE_ADMIN'}">Utilisateur</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
  </div>
</html>
