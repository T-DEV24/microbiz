<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroBiz Pro — Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f1117;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            top: -200px; left: 50%; transform: translateX(-50%);
            width: 600px; height: 400px;
            background: radial-gradient(ellipse, rgba(59,130,246,.15) 0%, transparent 70%);
            z-index: 0;
        }
        .login-card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%; max-width: 420px;
            backdrop-filter: blur(12px);
            animation: fadeUp .5s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .brand { text-align: center; margin-bottom: 36px; }
        .brand-logo {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 12px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 22px; margin-bottom: 14px;
        }
        .brand-name { font-size: 22px; font-weight: 600; color: #fff; letter-spacing: -.3px; }
        .brand-sub { font-size: 13px; color: rgba(255,255,255,.4); margin-top: 4px; }
        .form-label {
            font-size: 12px; font-weight: 500;
            color: rgba(255,255,255,.5); letter-spacing: .04em;
            text-transform: uppercase; margin-bottom: 6px;
        }
        .form-control {
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 10px;
            color: #fff; font-size: 14px;
            padding: 12px 16px; width: 100%;
            transition: border-color .2s, background .2s;
            font-family: 'DM Sans', sans-serif;
        }
        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59,130,246,.08);
            box-shadow: 0 0 0 3px rgba(59,130,246,.15);
        }
        .form-control::placeholder { color: rgba(255,255,255,.2); }
        .btn-login {
            width: 100%; padding: 13px;
            background: #3b82f6; color: #fff;
            border: none; border-radius: 10px;
            font-size: 14px; font-weight: 600;
            cursor: pointer; letter-spacing: .02em;
            transition: background .2s, transform .1s;
            font-family: 'DM Sans', sans-serif;
            margin-top: 8px;
        }
        .btn-login:hover  { background: #2563eb; }
        .btn-login:active { transform: scale(.98); }
        .alert-error {
            background: rgba(239,68,68,.12);
            border: 1px solid rgba(239,68,68,.3);
            border-radius: 10px; padding: 12px 14px;
            color: #fca5a5; font-size: 13px;
            margin-bottom: 20px; text-align: center;
        }
        .alert-logout {
            background: rgba(34,197,94,.1);
            border: 1px solid rgba(34,197,94,.25);
            border-radius: 10px; padding: 12px 14px;
            color: #86efac; font-size: 13px;
            margin-bottom: 20px; text-align: center;
        }
        .demo-box {
            margin-top: 28px;
            border-top: 1px solid rgba(255,255,255,.06);
            padding-top: 20px;
        }
        .demo-label {
            font-size: 11px; color: rgba(255,255,255,.25);
            text-align: center; margin-bottom: 10px;
            text-transform: uppercase; letter-spacing: .06em;
        }
        .demo-row { display: flex; gap: 8px; }
        .demo-chip {
            flex: 1; background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 8px; padding: 8px 10px;
            font-size: 11px; color: rgba(255,255,255,.4);
            font-family: 'DM Mono', monospace; cursor: pointer;
            transition: background .15s, border-color .15s;
        }
        .demo-chip:hover {
            background: rgba(255,255,255,.08);
            border-color: rgba(255,255,255,.15);
            color: rgba(255,255,255,.7);
        }
        .demo-chip strong { display: block; color: rgba(255,255,255,.6); font-size: 11px; }
        .mb-18 { margin-bottom: 18px; }
    </style>
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="login-card">
    <div class="brand">
        <div class="brand-logo">◈</div>
        <div class="brand-name">MicroBiz Pro</div>
        <div class="brand-sub">Gestion &amp; Analyse de micro-entreprise</div>
    </div>

    <div class="alert-error" th:if="${param.error}">
        Email ou mot de passe incorrect. Veuillez réessayer.
    </div>
    <div class="alert-logout" th:if="${param.logout}">
        Vous avez été déconnecté avec succès.
    </div>

    <!--
        FIX CRITIQUE : action="/login-process" (et non "/login")
        correspond au loginProcessingUrl dans SecurityConfig.
        Avec "/login" en action, Spring Security interceptait le GET
        de la page et créait une boucle infinie → ERR_TOO_MANY_REDIRECTS
    -->
    <form th:action="@{/login-process}" method="post">

        <!-- Token CSRF (CSRF réactivé dans SecurityConfig) -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-18">
            <label class="form-label">Email</label>
            <input type="email" name="username" class="form-control"
                   placeholder="admin@microbiz.com" required autofocus>
        </div>

        <div class="mb-18">
            <label class="form-label">Mot de passe</label>
            <input type="password" name="password" class="form-control"
                   placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">Se connecter</button>
    </form>

    <div class="demo-box">
        <div class="demo-label">Comptes de démonstration</div>
        <div class="demo-row">
            <div class="demo-chip" onclick="fillLogin('admin@microbiz.com','admin123')">
                <strong>Administrateur</strong>
                admin@microbiz.com / admin123
            </div>
            <div class="demo-chip" onclick="fillLogin('jean@microbiz.com','user123')">
                <strong>Utilisateur</strong>
                jean@microbiz.com / user123
            </div>
        </div>
    </div>
</div>

<script>
    function fillLogin(email, pwd) {
        document.querySelector('input[name="username"]').value = email;
        document.querySelector('input[name="password"]').value = pwd;
    }
</script>
</body>
</html>
