<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:replace="fragments/dashboard-layout :: layout(~{::content}, 'Clients', 'Gestion des clients', 'clients')">
  <div th:fragment="content">
    <style>
        .topbar { background:#fff; border-bottom:1px solid #e5e7eb; padding:16px 24px; display:flex; justify-content:space-between; align-items:center; }
        .page-title { font-size:28px; font-weight:700; color:#111827; line-height:1.2; }
        .page-sub { color:#6b7280; font-size:13px; margin-top:4px; }
        .content { padding:24px; }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; overflow:hidden; margin-bottom:16px; }
        .card-header { padding:14px 16px; border-bottom:1px solid #f3f4f6; display:flex; justify-content:space-between; align-items:center; }
        .card-title { font-size:14px; font-weight:700; color:#1f2937; }
        .card-body { padding:16px; }
        .form-label-dark { font-size:12px; font-weight:600; color:#6b7280; margin-bottom:6px; display:block; }
        .form-control-dark { width:100%; background:#fff; border:1px solid #d1d5db; border-radius:8px; padding:10px 12px; margin-bottom:10px; font-size:14px; }
        .btn-submit, .btn-primary-custom { display:inline-block; border:none; border-radius:8px; padding:10px 14px; font-size:13px; font-weight:600; background:#3b82f6; color:#fff; text-decoration:none; }
        .action-btn { border:1px solid #d1d5db; background:#fff; color:#374151; border-radius:8px; padding:6px 10px; font-size:12px; text-decoration:none; }
        .btn-edit { border-color:#c7d2fe; color:#4338ca; background:#eef2ff; }
        .btn-delete { border-color:#fecaca; color:#b91c1c; background:#fef2f2; }
        .alert-success { border:1px solid #bbf7d0; background:#f0fdf4; color:#166534; border-radius:10px; padding:10px 12px; margin-bottom:12px; }
        .metrics-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:16px; }
        .metric-card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:14px; }
        .metric-label { color:#6b7280; font-size:11px; text-transform:uppercase; letter-spacing:.05em; }
        .metric-value { color:#111827; font-size:24px; font-weight:700; margin:6px 0; }
        .metric-sub { color:#6b7280; font-size:12px; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:10px 12px; border-bottom:1px solid #f1f5f9; font-size:14px; }
        th { color:#6b7280; font-size:12px; text-transform:uppercase; letter-spacing:.05em; }
        .client-avatar { width:30px; height:30px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; background:#dbeafe; color:#1e3a8a; font-weight:700; }
        @media (max-width: 1100px) { .grid-2, .metrics-row { grid-template-columns: 1fr; } }
    </style>
    <div class="topbar">
        <div>
            <div class="page-title">Clients</div>
            <div class="page-sub" th:text="${clientsPage != null ? clientsPage.totalElements : #lists.size(clients)} + ' clients enregistrés'">0 clients</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
            <a href="/clients/nouveau" class="btn-primary-custom">+ Nouveau client</a>
            <a th:href="@{/clients/export.csv(q=${q})}" class="action-btn btn-edit">CSV</a>
            <a th:href="@{/clients/export.pdf(q=${q})}" class="action-btn btn-edit">PDF</a>
        </div>
    </div>
    <div class="content">
        <div class="alert-success" th:if="${succes}" th:text="${succes}"></div>
        <form th:action="@{/clients}" method="get" style="display:flex;gap:8px;margin-bottom:14px;align-items:center">
            <input type="text" name="q" class="form-control-dark" placeholder="Rechercher un client..." th:value="${q}" style="max-width:260px">
            <input type="hidden" name="sort" th:value="${sort}">
            <input type="hidden" name="dir" th:value="${dir}">
            <input type="hidden" name="size" th:value="${size}">
            <button type="submit" class="action-btn btn-edit">Filtrer</button>
            <a th:href="@{/clients(trash=${!trash})}" class="action-btn btn-delete" th:text="${trash ? 'Voir actifs' : 'Corbeille'}">Corbeille</a>
        </form>

        <div class="metrics-row">
            <div class="metric-card">
                <div class="metric-label">Total clients</div>
                <div class="metric-value" th:text="${clientsPage != null ? clientsPage.totalElements : #lists.size(clients)}">0</div>
                <div class="metric-sub">Base clients</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Avec email</div>
                <div class="metric-value" th:text="${#lists.size(clients.?[email != null and !email.isEmpty()])}">0</div>
                <div class="metric-sub">Contactables</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Avec téléphone</div>
                <div class="metric-value" th:text="${#lists.size(clients.?[telephone != null and !telephone.isEmpty()])}">0</div>
                <div class="metric-sub">Contactables</div>
            </div>
        </div>

        <div class="grid-2">
            <!-- Formulaire ajout rapide -->
            <div class="card" style="margin-bottom:0">
                <div class="card-header"><div class="card-title">Ajouter un client</div></div>
                <div class="card-body">
                    <form th:action="@{/clients/sauvegarder}" method="post">
                        <label class="form-label-dark">Nom complet *</label>
                        <input type="text" class="form-control-dark" name="nom" placeholder="Ex : Marie Ngo" required>
                        <label class="form-label-dark">Téléphone</label>
                        <input type="text" class="form-control-dark" name="telephone" placeholder="+237 670 000 000">
                        <label class="form-label-dark">Email</label>
                        <input type="email" class="form-control-dark" name="email" placeholder="client@email.com">
                        <button type="submit" class="btn-submit">Ajouter le client</button>
                    </form>
                </div>
            </div>

            <!-- Liste clients -->
            <div class="card" style="margin-bottom:0">
                <div class="card-header">
                    <div class="card-title">Base clients</div>
                    <span style="font-size:12px;color:var(--muted)" th:text="${clientsPage != null ? clientsPage.totalElements : #lists.size(clients)} + ' clients'"></span>
                </div>
                <div th:if="${#lists.isEmpty(clients)}" class="empty-state">Aucun client enregistré.</div>
                <table th:if="${not #lists.isEmpty(clients)}">
                    <thead><tr>
                        <th><a th:href="@{/clients(page=0,size=${size},sort='nom',dir=${sort=='nom' and dir=='asc' ? 'desc':'asc'},q=${q},trash=${trash})}">Client</a></th>
                        <th><a th:href="@{/clients(page=0,size=${size},sort='telephone',dir=${sort=='telephone' and dir=='asc' ? 'desc':'asc'},q=${q},trash=${trash})}">Téléphone</a></th>
                        <th><a th:href="@{/clients(page=0,size=${size},sort='email',dir=${sort=='email' and dir=='asc' ? 'desc':'asc'},q=${q},trash=${trash})}">Email</a></th>
                        <th><a th:href="@{/clients(page=0,size=${size},sort='dateInscription',dir=${sort=='dateInscription' and dir=='asc' ? 'desc':'asc'},q=${q},trash=${trash})}">Inscription</a></th>
                        <th></th>
                    </tr></thead>
                    <tbody>
                    <tr th:each="c : ${clients}">
                        <td>
                            <div style="display:flex;align-items:center;gap:10px">
                                <div class="client-avatar" th:text="${#strings.substring(c.nom,0,1).toUpperCase()}">A</div>
                                <span style="font-weight:500" th:text="${c.nom}">--</span>
                            </div>
                        </td>
                        <td th:text="${c.telephone != null ? c.telephone : '—'}" style="color:var(--muted);font-size:12px">—</td>
                        <td th:text="${c.email != null ? c.email : '—'}" style="color:var(--muted);font-size:12px">—</td>
                        <td th:text="${c.dateInscription != null ? #temporals.format(c.dateInscription,'dd/MM/yyyy') : '—'}" style="color:var(--muted);font-size:12px">—</td>
                        <td>
                            <a th:if="${!trash}" th:href="@{/clients/modifier/{id}(id=${c.id})}" class="action-btn btn-edit">Modifier</a>
                            <form th:if="${!trash}" th:action="@{/clients/supprimer/{id}(id=${c.id})}" method="post" style="display:inline">
                                <button type="submit" class="action-btn btn-delete"
                                        onclick="return confirm('Supprimer ce client ?')">Supprimer</button>
                            </form>
                            <form th:if="${trash}" th:action="@{/clients/restaurer/{id}(id=${c.id})}" method="post" style="display:inline">
                                <button type="submit" class="action-btn btn-edit">Restaurer</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
                <div class="pagination-row" th:if="${clientsPage != null and clientsPage.totalPages > 1}" style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
                    <small style="color:var(--muted)"
                           th:text="'Page ' + (${clientsPage.number}+1) + ' / ' + ${clientsPage.totalPages}"></small>
                    <div style="display:flex;gap:8px">
                        <a class="action-btn btn-edit"
                           th:if="${clientsPage.hasPrevious()}"
                           th:href="@{/clients(page=${clientsPage.number-1},size=${size},sort=${sort},dir=${dir},q=${q},trash=${trash})}">Précédent</a>
                        <a class="action-btn btn-edit"
                           th:if="${clientsPage.hasNext()}"
                           th:href="@{/clients(page=${clientsPage.number+1},size=${size},sort=${sort},dir=${dir},q=${q},trash=${trash})}">Suivant</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
  </div>
</html>
