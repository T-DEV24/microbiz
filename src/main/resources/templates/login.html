<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroBiz Pro — Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="manifest" th:href="@{/manifest.webmanifest}">
    <style>
        body {
            font-family:'DM Sans',sans-serif; background:#0f1117;
            min-height:100vh; display:flex; align-items:center;
            justify-content:center; position:relative; overflow:hidden;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background-image:
                    linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
            background-size:40px 40px; z-index:0;
        }
        body::after {
            content:''; position:fixed; top:-200px; left:50%; transform:translateX(-50%);
            width:600px; height:400px;
            background:radial-gradient(ellipse, rgba(59,130,246,.12) 0%, transparent 70%);
            z-index:0;
        }
        .login-card {
            position:relative; z-index:1;
            background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
            border-radius:20px; padding:44px 40px;
            width:100%; max-width:420px;
            backdrop-filter:blur(12px);
            animation:fadeUp .45s ease both;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(18px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .brand-logo {
            width:52px; height:52px;
            background:linear-gradient(135deg,#3b82f6,#1d4ed8);
            border-radius:12px; display:inline-flex;
            align-items:center; justify-content:center;
            font-size:24px; color:#fff; margin-bottom:14px;
        }
        .form-control-dark {
            background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1);
            border-radius:10px; color:#fff; font-size:14px;
            padding:12px 14px; transition:border-color .2s,background .2s;
            font-family:'DM Sans',sans-serif;
        }
        .form-control-dark:focus {
            outline:none; border-color:#3b82f6;
            background:rgba(59,130,246,.08); box-shadow:0 0 0 3px rgba(59,130,246,.15);
            color:#fff;
        }
        .form-control-dark::placeholder { color:rgba(255,255,255,.25); }
        .form-label-dark { font-size:12px; font-weight:500; color:rgba(255,255,255,.5);
            letter-spacing:.04em; text-transform:uppercase; }
        .btn-login {
            width:100%; padding:13px; background:#3b82f6; color:#fff;
            border:none; border-radius:10px; font-size:14px; font-weight:600;
            cursor:pointer; transition:background .2s,transform .1s;
            font-family:'DM Sans',sans-serif;
        }
        .btn-login:hover  { background:#2563eb; }
        .btn-login:active { transform:scale(.98); }
        .demo-chip {
            flex:1; background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);
            border-radius:8px; padding:8px 10px; font-size:11px;
            color:rgba(255,255,255,.4); font-family:'DM Mono',monospace;
            cursor:pointer; transition:background .15s,border-color .15s;
        }
        .demo-chip:hover { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.15); color:rgba(255,255,255,.7); }
        .demo-chip strong { display:block; color:rgba(255,255,255,.6); font-size:11px; margin-bottom:2px; }
    </style>
  <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<div class="login-card">
    <div class="text-center mb-4">
        <div class="brand-logo">◈</div>
        <div style="font-size:22px;font-weight:600;color:#fff">MicroBiz Pro</div>
        <div style="font-size:13px;color:rgba(255,255,255,.4);margin-top:4px">Gestion & Analyse de micro-entreprise</div>
    </div>

    <div class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3"
         th:if="${param.error}" role="alert" style="font-size:13px;border-radius:10px">
        <i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
        Email ou mot de passe incorrect.
    </div>
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2 mb-3"
         th:if="${param.ratelimit}" role="alert" style="font-size:13px;border-radius:10px">
        <i class="bi bi-shield-lock-fill flex-shrink-0"></i>
        Trop de tentatives de connexion. Réessayez dans 1 minute.
    </div>

    <div class="alert alert-success d-flex align-items-center gap-2 py-2 mb-3"
         th:if="${param.logout}" role="alert" style="font-size:13px;border-radius:10px">
        <i class="bi bi-check-circle-fill flex-shrink-0"></i>
        Vous avez été déconnecté avec succès.
    </div>

    <form th:action="@{/login-process}" method="post">
        <div class="mb-3">
            <label class="form-label-dark d-block mb-2">Email</label>
            <input type="email" name="username" class="form-control form-control-dark w-100"
                   placeholder="admin@microbiz.com" required autofocus>
        </div>
        <div class="mb-4">
            <label class="form-label-dark d-block mb-2">Mot de passe</label>
            <input type="password" name="password" class="form-control form-control-dark w-100"
                   placeholder="••••••••" required>
        </div>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"
               th:if="${_csrf != null}">
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
        </button>
    </form>

    <!-- Comptes de démo -->
    <div class="mt-5 pt-4" style="border-top:1px solid rgba(255,255,255,.06)">
        <div style="font-size:11px;color:rgba(255,255,255,.25);text-align:center;text-transform:uppercase;
                letter-spacing:.06em;margin-bottom:10px">Comptes de démonstration</div>
        <div class="d-flex gap-2">
            <div class="demo-chip" onclick="fillLogin('admin@microbiz.com','admin123')">
                <strong>Administrateur</strong>admin@microbiz.com<br>admin123
            </div>
            <div class="demo-chip" onclick="fillLogin('jean@microbiz.com','user123')">
                <strong>Utilisateur</strong>jean@microbiz.com<br>user123
            </div>
        </div>
    </div>
</div>

<script>
    function fillLogin(email, pwd) {
        document.querySelector('input[name=username]').value = email;
        document.querySelector('input[name=password]').value = pwd;
    }
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
    }
</script>
</body>
</html>
