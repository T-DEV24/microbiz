<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org"
      th:replace="fragments/dashboard-layout :: layout(~{::content}, 'Devises', 'Taux de change', 'devises')">
<div th:fragment="content">
    <div class="container-fluid p-4" style="max-width:900px">
        <h2 class="mb-3">Taux de change (devise principale : <span th:text="${baseCurrency}">XAF</span>)</h2>
        <div class="alert alert-success" th:if="${succes}" th:text="${succes}"></div>

        <div class="card p-3 shadow-sm mb-3">
            <form class="row g-2" th:action="@{/devises/rate}" method="post">
                <div class="col-md-4">
                    <label class="form-label">Code devise</label>
                    <select class="form-select" name="code">
                        <option>XAF</option><option>EUR</option><option>USD</option><option>GNF</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Taux vers devise principale</label>
                    <input type="number" step="0.0001" min="0.0001" name="rate" class="form-control" required>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button class="btn btn-primary w-100" type="submit">Mettre à jour</button>
                </div>
            </form>
        </div>

        <div class="card p-3 shadow-sm">
            <table class="table table-sm mb-0">
                <thead><tr><th>Devise</th><th>Taux</th></tr></thead>
                <tbody>
                <tr th:each="entry : ${rates}">
                    <td th:text="${entry.key}"></td>
                    <td th:text="${entry.value}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</html>
