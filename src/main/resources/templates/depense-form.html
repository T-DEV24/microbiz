<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MicroBiz Pro — Dépense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#0f1117;--surface:#161b27;--border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);--text:#e2e8f0;--muted:rgba(255,255,255,.4);--blue:#3b82f6;--red:#ef4444;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
        .form-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px 40px;width:100%;max-width:480px;}
        .form-title{font-size:18px;font-weight:600;color:#fff;margin-bottom:6px;}
        .form-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
        .form-label-dark{font-size:11px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:6px;}
        .form-control-dark{background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;padding:10px 14px;font-family:'DM Sans',sans-serif;width:100%;transition:border-color .15s;margin-bottom:16px;}
        .form-control-dark:focus{outline:none;border-color:var(--blue);background:rgba(59,130,246,.06);}
        .form-control-dark option{background:#1c2333;}
        .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;}
        .btn-submit{background:var(--blue);color:#fff;border:none;border-radius:9px;padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;}
        .btn-submit:hover{background:#2563eb;}
        .btn-cancel{background:none;color:var(--muted);border:1px solid var(--border2);border-radius:9px;padding:10px 18px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block;}
        .error-text{color:#fca5a5;font-size:12px;margin-top:-12px;margin-bottom:10px;}
    </style>
</head>
<body>
<div class="form-card">
    <div class="form-title" th:text="${depense.id != null} ? 'Modifier la dépense' : 'Nouvelle dépense'">Dépense</div>
    <div class="form-sub">Enregistrement d'une charge de l'activité</div>

    <form th:action="@{/depenses/sauvegarder}" method="post" th:object="${depense}">
        <input type="hidden" th:field="*{id}">

        <label class="form-label-dark">Description *</label>
        <input type="text" class="form-control-dark" th:field="*{description}" placeholder="Ex : Achat fruits frais marché" required>
        <div class="error-text" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>

        <label class="form-label-dark">Catégorie *</label>
        <select class="form-control-dark" th:field="*{categorie}" required>
            <option value="Matieres premieres">Matières premières</option>
            <option value="Loyer">Loyer</option>
            <option value="Transport">Transport</option>
            <option value="Salaires">Salaires</option>
            <option value="Electricite">Électricité</option>
            <option value="Divers">Divers</option>
        </select>

        <label class="form-label-dark">Montant (FCFA) *</label>
        <input type="number" class="form-control-dark" th:field="*{montant}" placeholder="15000" step="0.01" required>
        <div class="error-text" th:if="${#fields.hasErrors('montant')}" th:errors="*{montant}"></div>

        <label class="form-label-dark">Date</label>
        <input type="date" class="form-control-dark" th:field="*{dateDepense}">

        <div class="form-actions">
            <a href="/depenses" class="btn-cancel">Annuler</a>
            <button type="submit" class="btn-submit" th:text="${depense.id != null} ? 'Enregistrer' : 'Ajouter'">Ajouter</button>
        </div>
    </form>
</div>
</body>
</html>
