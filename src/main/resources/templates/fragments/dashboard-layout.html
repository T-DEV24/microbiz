<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content, pageTitle, pageSubtitle, active)">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${pageTitle} ?: 'MicroBiz Pro'">MicroBiz Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link th:href="@{/css/style.css}" rel="stylesheet">
  <link rel="manifest" th:href="@{/manifest.webmanifest}">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family:'DM Sans',sans-serif; background:#f0f2f5; }
    .sidebar { width:240px; min-height:100vh; background:#0f1117; border-right:1px solid rgba(255,255,255,.07); position:fixed; top:0; left:0; bottom:0; display:flex; flex-direction:column; z-index:100; }
    .brand-logo { width:36px; height:36px; background:#3b82f6; border-radius:9px; display:inline-flex; align-items:center; justify-content:center; font-size:18px; color:#fff; }
    .nav-section { font-size:10px; color:rgba(255,255,255,.3); text-transform:uppercase; letter-spacing:.08em; padding:14px 16px 4px; }
    .sidebar .nav-link { color:rgba(255,255,255,.5); font-size:13px; font-weight:500; padding:9px 16px; border-radius:8px; margin:1px 8px; transition:all .15s; display:flex; align-items:center; gap:10px; }
    .sidebar .nav-link:hover { background:rgba(255,255,255,.07); color:#fff; }
    .sidebar .nav-link.active { background:rgba(59,130,246,.2); color:#60a5fa; }
    .sidebar .nav-link i { font-size:15px; width:18px; text-align:center; }
    .sidebar-footer { padding:12px 16px; border-top:1px solid rgba(255,255,255,.07); }
    .user-avatar { width:32px; height:32px; border-radius:50%; background:rgba(59,130,246,.25); color:#60a5fa; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; }
    .main { margin-left:240px; min-height:100vh; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; background:#fff; border-bottom:1px solid #e5e7eb; padding:14px 28px; position:sticky; top:0; z-index:50; }
    .card-section { background:#fff; border-radius:12px; border:1px solid #e5e7eb; margin-bottom:20px; overflow-x:auto; }
    .card-section .card-header { background:transparent; border-bottom:1px solid #f3f4f6; padding:14px 18px; font-weight:600; font-size:13px; color:#111827; }
    .alert-toast { position:fixed; top:20px; right:20px; z-index:9999; min-width:320px; animation:slideIn .3s ease; }
    @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
    .mobile-nav { display:none; }
    .mobile-nav-toggle { border:1px solid #d1d5db; background:#fff; color:#111827; border-radius:10px; width:40px; height:40px; display:inline-flex; align-items:center; justify-content:center; }
    .sidebar-overlay { display:none; }
    @media (max-width: 992px) {
      body.sidebar-open { overflow:hidden; }
      .mobile-nav { display:flex; position:sticky; top:0; z-index:120; background:#fff; border-bottom:1px solid #e5e7eb; padding:10px 14px; align-items:center; justify-content:space-between; }
      .mobile-brand { display:flex; align-items:center; gap:10px; font-weight:600; color:#111827; font-size:14px; }
      .mobile-brand-logo { width:28px; height:28px; background:#3b82f6; color:#fff; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; font-size:14px; }
      .sidebar { transform:translateX(-100%); transition:transform .25s ease; width:min(86vw, 320px); }
      body.sidebar-open .sidebar { transform:translateX(0); box-shadow:0 0 0 9999px rgba(15,17,23,.35); }
      .sidebar-overlay { display:block; position:fixed; inset:0; background:rgba(15,17,23,.45); opacity:0; visibility:hidden; transition:opacity .25s ease; z-index:90; }
      body.sidebar-open .sidebar-overlay { opacity:1; visibility:visible; }
      .main { margin-left:0; min-height:100vh; }
      .topbar { padding:12px 14px; }
      .topbar > * { min-width:0; }
    }

  </style>
</head>
<body>
<div class="mobile-nav">
  <button type="button" class="mobile-nav-toggle" id="mobileNavToggle" aria-label="Ouvrir le menu" aria-controls="sidebarMenu" aria-expanded="false">
    <i class="bi bi-list fs-5"></i>
  </button>
  <div class="mobile-brand"><span class="mobile-brand-logo">◈</span> MicroBiz Pro</div>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebarMenu">
  <div class="p-3 border-bottom" style="border-color:rgba(255,255,255,.07)!important">
    <div class="d-flex align-items-center gap-2">
      <div class="brand-logo">◈</div>
      <div>
        <div style="font-size:14px;font-weight:600;color:#fff">MicroBiz Pro</div>
        <div style="font-size:11px;color:rgba(255,255,255,.4)" th:text="${pageSubtitle} ?: ''">Menu</div>
      </div>
    </div>
  </div>
  <nav class="flex-grow-1 py-2">
    <div class="nav-section">Principal</div>
    <a href="/dashboard" class="nav-link" th:classappend="${active} == 'dashboard' ? ' active' : ''"><i class="bi bi-grid-fill"></i> Dashboard</a>
    <a href="/ventes" class="nav-link" th:classappend="${active} == 'ventes' ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','USER','COMMERCIAL')"><i class="bi bi-bag-check"></i> Ventes</a>
    <a href="/produits" class="nav-link" th:classappend="${active} == 'produits' ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','USER','COMMERCIAL')"><i class="bi bi-box-seam"></i> Produits</a>
    <a href="/clients" class="nav-link" th:classappend="${active} == 'clients' ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','USER','COMMERCIAL')"><i class="bi bi-people"></i> Clients</a>
    <a href="/fournisseurs" class="nav-link" th:classappend="${active} == 'fournisseurs' ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','USER')"><i class="bi bi-truck"></i> Fournisseurs</a>
    <a href="/mouvements-stock" class="nav-link" th:classappend="${active} == 'mouvements-stock' ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','USER')"><i class="bi bi-arrow-left-right"></i> Mouvements stock</a>
    <a href="/entreprise" class="nav-link" th:classappend="${active} == 'entreprise' ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','USER')"><i class="bi bi-building"></i> Entreprise</a>
    <a href="/devises" class="nav-link" th:classappend="${active} == 'devises' ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','USER')"><i class="bi bi-currency-exchange"></i> Devises</a>
    <div class="nav-section">Finance</div>
    <a href="/depenses" class="nav-link" th:classappend="${active} == 'depenses' ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','USER')"><i class="bi bi-credit-card"></i> Dépenses</a>
    <a href="/factures" class="nav-link" th:classappend="${active} == 'factures' ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','USER')"><i class="bi bi-receipt"></i> Factures</a>
    <a href="/statistiques" class="nav-link" th:classappend="${active} == 'statistiques' ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','USER','COMMERCIAL')"><i class="bi bi-bar-chart-line"></i> Statistiques</a>
    <a href="/comptabilite/ohada" class="nav-link" th:classappend="${active} == 'ohada' ? ' active' : ''" sec:authorize="hasAnyRole('ADMIN','USER')"><i class="bi bi-journal-text"></i> Compta OHADA</a>
    <div class="nav-section" sec:authorize="hasRole('ADMIN')">Système</div>
    <a href="/utilisateurs" class="nav-link" th:classappend="${active} == 'utilisateurs' ? ' active' : ''" sec:authorize="hasRole('ADMIN')"><i class="bi bi-shield-lock"></i> Utilisateurs</a>
    <a href="/audit-logs" class="nav-link" th:classappend="${active} == 'audit-logs' ? ' active' : ''" sec:authorize="hasRole('ADMIN')"><i class="bi bi-journal-check"></i> Audit logs</a>
    <a href="/saas/admin" class="nav-link" th:classappend="${active} == 'saas-admin' ? ' active' : ''" sec:authorize="hasRole('ADMIN')"><i class="bi bi-hdd-network"></i> SaaS Admin</a>
    <a href="/docs" class="nav-link" th:classappend="${active} == 'api-docs' ? ' active' : ''" sec:authorize="hasRole('ADMIN')"><i class="bi bi-code-slash"></i> API Docs</a>
  </nav>
  <div class="sidebar-footer">
    <div class="d-flex align-items-center gap-2">
      <div class="user-avatar" th:text="${#strings.substring(#authentication.name,0,1).toUpperCase()}" sec:authentication="name">A</div>
      <div class="flex-grow-1" style="min-width:0">
        <div style="font-size:12px;font-weight:500;color:#fff" sec:authentication="name">Utilisateur</div>
        <div style="font-size:11px;color:rgba(255,255,255,.4)">Connecté</div>
      </div>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-sm" style="font-size:11px;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.15);background:none">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </form>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <div th:insert="${content}"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/offline-sync.js}"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
  }
</script>


<script th:src="@{/js/mobile-nav.js}"></script>
</body>
</html>
