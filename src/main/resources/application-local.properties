# ============================================================
# PROFIL LOCAL — base H2 embarquée + comptes de démonstration
# Démarrage : SPRING_PROFILES_ACTIVE=local ./mvnw spring-boot:run
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/microbiz;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=${MICROBIZ_H2_CONSOLE:true}

microbiz.seed.demo-data=true
microbiz.seed.admin-password=${MICROBIZ_ADMIN_PASSWORD:admin123}
microbiz.seed.user-password=${MICROBIZ_USER_PASSWORD:user123}
